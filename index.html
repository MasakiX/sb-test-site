<!DOCTYPE html>
<html>
<head>
  <title>SB Resolution</title>
<style>
  body { font-family: Arial; padding: 20px; }
  .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
  .tab-btn { padding: 10px 15px; border: 1px solid green; cursor: pointer; }
  .active { background: green; color: white; }
  .tab-section { display: none; }
  .tab-section.acative { display: block; }
</style>
</head>
<body>

<h1>SB Resolution</h1>

<div class="tabs">
  <a href="#2026" class="tab-btn active">SB CY 2026</a>
  <a href="#2025" class="tab-btn">SB CY 2025</a>
  <a href="#2024" class="tab-btn">SB CY 2024</a>
  <a href="#2023" class="tab-btn">SB CY 2023</a>
</div>

<div id="2026" class="tab-section active">
  <p>No files added yet (2026)</p>
</div>

<div id="2025" class="tab-section">
  <p>Sample file for 2025</p>
</div>

<div id="2024" class="tab-section">
  <p>Sample file for 2024</p>
</div>

<div id="2023" class="tab-section">
  <ul>
    <li><a href="https://github.com/MasakiX/sb-test-site/tree/4591e0779382c8f2aa413fa7b086f633e189b623/files/2023" target="_blank">SB RESOLUTION NO. 01</li>
  </ul>
</div>

<script>
 // Select all tab buttons
 const tabs = document.querySelectorAll(".tab-btn");
 const sections = document.querySelectorAll(".tab-section");

  tabs.forEach(tab => {
    tab.addEventListener("click", function() {
      // Remove active from all buttons and sections
      tabs.forEach(t => t.classList.remove("active"));
      sections.forEach(s => s.classList.remove("active"));

      // Add active to clicked button and corresponding section
      tab.classList.add("active");
      const year = tab.getAttribute("data-year");

document.getElementById(year).classList.add("active");
    });
  });
</script>

</body>
</html>
